<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Ghibli - Experiencia Visual</title>
    <link rel="icon" href="IMG3.jpg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
        <button id="btnMusica" class="btn btn-warning shadow-sm rounded-circle">
            <span id="iconoMusica">🔊</span>
        </button>
        <audio id="musicaGhibli" loop autoplay>
            <source src="au1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-3 fw-bold text-white shadow-lg">Studio Ghibli</h1>
        </header>

        <section class="bg-white bg-opacity-75 p-4 rounded shadow-sm mb-5">
            <div class="text-center">
                <h2 class="intro-titulo">¿Qué es esto?</h2>
                <p class="mt-3 intro-texto">
                   Bienvenida a mi web sobre las pelis del Studio Ghibli. Ahora puedes guardar tus favoritas.
                </p>
            </div>
        </section>

        <section class="row justify-content-center mb-5">
            <div class="col-md-6">
                <input type="text" id="buscador" class="form-control form-control-lg shadow" placeholder=" Busca por título o director...">
            </div>
        </section>

        <section id="zona-aleatoria" class="py-4 mb-5 rounded shadow-lg bg-white bg-opacity-75">
            <h3 class="fw-bold">¿Qué película vemos hoy?</h3>
            <button type="button" class="btn btn-warning my-3 fw-bold shadow-sm" id="nuevaPeli">¡A ver que te toca!</button>
            <div id="peli-destacada" class="d-flex justify-content-center"></div>
        </section>

        <section id="seccion-favoritos" class="py-4 mb-5 rounded shadow-lg bg-light bg-opacity-90">
            <h2 class="fw-bold text-dark">⭐ Mis Favoritas</h2>
            <div id="favoritos-container" class="row justify-content-center g-4 p-3">
                </div>
        </section>

        <hr class="border-white mb-5">

        <h2 class="my-4 text-white shadow-lg fw-bold">Catálogo Completo</h2>
        <div id="peliculas-container" class="row justify-content-center g-4"></div>
    </div>

    <script src="core.js"></script>
</body>
</html>
